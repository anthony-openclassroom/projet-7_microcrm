input {
  # Logs Spring Boot via LogstashTcpSocketAppender
  tcp {
    port  => 5000
    codec => json_lines
    tags  => ["spring-boot"]
  }

  # Logs Caddy (front) via Filebeat
  beats {
    port => 5044
    tags => ["caddy"]
  }
}

filter {
  # Enrichissement commun
  mutate {
    add_field => { "received_at" => "%{@timestamp}" }
  }

  # Logs Spring Boot : le niveau est dans le champ "level"
  if "spring-boot" in [tags] {
    mutate {
      rename => { "level"   => "log_level" }
      rename => { "logger_name" => "logger" }
      rename => { "thread_name" => "thread" }
    }
  }

  # Logs Caddy : extraire le status HTTP pour les métriques
  if "caddy" in [tags] {
    if [status] {
      mutate {
        convert => { "status" => "integer" }
      }
    }
    if [duration] {
      mutate {
        convert => { "duration" => "float" }
      }
    }
  }
}

output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOST:=elasticsearch}:9200"]
    index    => "microcrm-%{[tags][0]}-%{+YYYY.MM.dd}"
    action   => "create"
  }
}
