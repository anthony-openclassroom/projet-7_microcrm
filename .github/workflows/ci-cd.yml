name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  backend:
    name: Backend — Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle
      - run: chmod +x gradlew && ./gradlew build
      - uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: back/build/libs/*.jar
      - uses: actions/upload-artifact@v7
        with:
          name: backend-reports
          path: |
            back/build/reports/jacoco/
            back/build/classes/

  frontend:
    name: Frontend — Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci
      - run: npm test -- --no-watch --browsers=ChromeHeadlessNoSandbox
      - run: npm run build
      - run: npm audit --audit-level=high
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: front/dist/microcrm/browser/

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: backend-reports
          path: .
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.sources=back/src/main,front/src
            -Dsonar.java.binaries=back/build/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=back/build/reports/jacoco/test/jacocoTestReport.xml
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts

  docker:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: [sonar]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta-back
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/orion-microcrm-back
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: back
          push: true
          tags: ${{ steps.meta-back.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - id: meta-front
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/orion-microcrm-front
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: front
          push: true
          tags: ${{ steps.meta-front.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: backend-jar
          path: artifacts/
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: artifacts/front/
      - run: cd artifacts/front && zip -r ../microcrm-front-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.jar
            artifacts/microcrm-front-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
